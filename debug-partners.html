<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>속성 키 디버그</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #f5f5f5; }
    pre  { background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 8px;
           white-space: pre-wrap; word-break: break-all; font-size: 12px; }
    h2   { margin-top: 28px; color: #333; }
  </style>
</head>
<body>
  <h1>🔍 선교사 속성 키 확인</h1>

  <h2>/partners-missionary 첫 번째 항목 속성 전체</h2>
  <pre id="out">로딩 중...</pre>

  <script>
    fetch('https://dark-pine-8ced.superddj00.workers.dev/partners-missionary')
      .then(r => r.json())
      .then(data => {
        const pages = data.results || [];
        if (!pages.length) { document.getElementById('out').textContent = '결과 없음'; return; }

        const p = pages[0];
        // 속성 키와 타입, 값을 모두 출력
        const props = {};
        for (const [key, val] of Object.entries(p.properties)) {
          let value = '(파싱불가)';
          try {
            if (val.type === 'title')        value = val.title.map(t=>t.plain_text).join('');
            else if (val.type === 'rich_text') value = val.rich_text.map(t=>t.plain_text).join('');
            else if (val.type === 'select')    value = val.select?.name || '(비어있음)';
            else if (val.type === 'multi_select') value = val.multi_select.map(s=>s.name).join(', ') || '(비어있음)';
            else if (val.type === 'url')       value = val.url || '(비어있음)';
            else if (val.type === 'files')     value = val.files?.[0] ? '파일있음' : '(비어있음)';
            else value = '(type: ' + val.type + ')';
          } catch(e) { value = '오류: ' + e.message; }
          props[key] = { type: val.type, value };
        }

        document.getElementById('out').textContent =
          '=== 페이지 ID: ' + p.id + ' ===\n\n' +
          JSON.stringify(props, null, 2);
      })
      .catch(e => { document.getElementById('out').textContent = '에러: ' + e.message; });
  </script>
</body>
</html>
